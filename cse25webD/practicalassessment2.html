<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Student Profile Dashboard</title>
<style>
  body{font-family:sans-serif;
    background:#f0f4f8;
    display:flex;justify-content:center;
    align-items:center;min-height:100vh;
    margin:0}
  .box{background:#fff;
    border-radius:16px;padding:40px;
    box-shadow:0 4px 20px rgba(0,0,0,.1);
    text-align:center}
  h1{margin-bottom:32px;
    color:#2d3748}
  .cards{display:flex;
    gap:28px;
    justify-content:center}
  .card{border:1.5px solid #e2e8f0;
    border-radius:12px;
    padding:24px;
    width:220px}
  .card img{width:160px;
    height:180px;
    object-fit:cover;
    border-radius:8px;
    margin-bottom:16px;
    background:#dde3ec}
  p{margin:5px 0;font-size:.9rem;
    color:#4a5568}
  p b{color:#2d3748}
</style>
</head>
<body>
<div class="box">
  <h1>Student Profile Dashboard</h1>
  <div class="cards">
    <div class="card">
      <!-- Replace src with your image path e.g. src="rahul.jpg" -->
      <img src="https://img.magnific.com/free-photo/portrait-attractive-latin-student-doing-some-school-work-with-laptop-library_662251-1218.jpg?semt=ais_hybrid&w=740&q=80" alt="Rahul Sharma"/>
      <p><b>Name:</b> Rahul Sharma</p>
      <p><b>Course:</b> B.Tech CSE</p>
      <p><b>Year:</b> 3rd Year</p>
      <p><b>CGPA:</b> 8.5</p>
    </div>
    <div class="card">
      <!-- Replace src with your image path e.g. src="priya.jpg" -->
      <img src="https://www.shutterstock.com/image-photo/asian-female-student-9th-grade-260nw-2642615169.jpg" alt="Priya Singh"/>
      <p><b>Name:</b> Priya Singh</p>
      <p><b>Course:</b> BCA</p>
      <p><b>Year:</b> 2nd Year</p>
      <p><b>CGPA:</b> 9.1</p>
    </div>
  </div>
</div>
</body>
</html>
